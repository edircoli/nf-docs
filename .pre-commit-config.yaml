repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.6
    hooks:
      - id: ruff
        args: [--fix]
        exclude: ^examples/
      - id: ruff-format
        exclude: ^examples/

  - repo: local
    hooks:
      - id: ty
        name: ty
        language: system
        entry: ty check src/
        pass_filenames: false
        types: [python]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [markdown, yaml, html]
        exclude: ^examples/

  - repo: local
    hooks:
      - id: tailwind-css
        name: Build Tailwind CSS
        language: system
        entry: ./build-assets/build-tailwind.sh
        pass_filenames: false
        files: (\.css$|templates/.*\.html$|tailwind)
